id: default
version: 1
label: Default
description: The standard plan → architect → implement → validate → review
  workflow. Review loops back to fix and re-validate until it passes or the
  bound is hit, then a verify gate decides merge-readiness. Runs when no other
  flow is picked.
seats:
  planner:
    label: Planner
    description: Turns the task into a plan.
  architect:
    label: Architect
    description: Designs the approach from the plan.
  implementer:
    label: Implementer
    description: Implements the plan and architecture.
  reviewer:
    label: Reviewer
    description: Reviews the diff and decides whether changes are needed.
  fixer:
    label: Fixer
    description: Addresses review findings.
  verifier:
    label: Verifier
    description: Independently verifies the approved result.
steps:
  - id: plan
    label: Plan
    kind: agent-turn
    seat: planner
    inputs:
      - task-brief
    outputs:
      - plan
    optional: false
    skipWhenReadOnly: false
    stage: planning
  - id: architecture
    label: Architecture
    kind: agent-turn
    seat: architect
    inputs:
      - task-brief
      - plan
    outputs:
      - architecture
    optional: false
    skipWhenReadOnly: false
    stage: architecting
  - id: implement
    label: Implement
    kind: agent-turn
    seat: implementer
    inputs:
      - task-brief
      - plan
      - architecture
    outputs:
      - execution
      - diff
    optional: false
    skipWhenReadOnly: true
    stage: executing
  - id: validation
    label: Validate
    kind: validation
    inputs:
      - diff
    outputs:
      - validation
    optional: false
    skipWhenReadOnly: true
    stage: executing
  - id: review
    label: Review
    kind: review-turn
    seat: reviewer
    inputs:
      - task-brief
      - plan
      - architecture
      - execution
      - validation
    outputs:
      - findings
      - review-decision
    optional: false
    skipWhenReadOnly: false
    stage: reviewing
  - id: fix
    label: Fix
    kind: response-turn
    seat: fixer
    inputs:
      - task-brief
      - plan
      - architecture
      - execution
      - findings
      - validation
    outputs:
      - finding-responses
      - diff
    optional: false
    skipWhenReadOnly: true
    stage: executing
  - id: revalidation
    label: Re-validate
    kind: validation
    inputs:
      - diff
    outputs:
      - validation
    optional: false
    skipWhenReadOnly: true
    stage: executing
  - id: verify
    label: Verify
    kind: summary-turn
    seat: verifier
    inputs:
      - task-brief
      - plan
      - architecture
      - execution
      - findings
      - validation
    outputs:
      - verification
    optional: false
    skipWhenReadOnly: true
    stage: verifying
loop:
  from: review
  to: revalidation
  decisionStep: review
  maxIterations: 3
